# The Site Configuration
theme: jekyll-theme-chirpy

lang: en
timezone:

# jekyll-seo-tag settings
title: XON (XML Object Notation)
tagline: XML-based format for representing JSON without losing type information
description: >-
  XON is an XML-based format for representing JSON data without losing type information.
  It uses attributes in the xon: namespace to preserve JSON types.

# For GitHub Pages project site or custom domain
url: "https://xmlon.org"
baseurl: ""

github:
  username: wearefrank

social:
  name: wearefrank
  email:
  links:
    - https://github.com/wearefrank/xmlon

# Site Verification (optional)
webmaster_verifications:
  google:
  bing:

# Analytics (optional)
analytics:
  google:
    id:

# Prefer color scheme: light, dark, or leave empty for system default
theme_mode:

# Avatar and social preview (optional)
avatar:
social_preview_image:

# Table of contents in posts
toc: true

# Comments (disabled)
comments:
  provider:

# PWA
pwa:
  enabled: false
  cache:
    enabled: false

paginate: 10

# ------------ Theme defaults ------------
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
  span:
    line_numbers: false
  block:
    line_numbers: true
    start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
